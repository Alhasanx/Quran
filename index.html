<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>يُنعشني إنجازي 🍹</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  color:#2d1b00;
  background:#FFF8EE;
  background-image:
    radial-gradient(circle at 15% 20%, #FFE0B2 0%, transparent 40%),
    radial-gradient(circle at 85% 10%, #FCE4EC 0%, transparent 35%),
    radial-gradient(circle at 50% 90%, #E8F5E9 0%, transparent 40%),
    radial-gradient(circle at 90% 70%, #FFF9C4 0%, transparent 35%);
}

.view{display:none}.view.active{display:block}
.page{max-width:460px;margin:0 auto;padding:14px}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,#FF6B35 0%,#FF8E53 35%,#FFC341 70%,#FFE066 100%);
  color:#fff;
  padding:22px 20px 18px;
  border-radius:24px;
  margin-bottom:14px;
  text-align:center;
  box-shadow:0 8px 30px rgba(255,107,53,.35);
  position:relative;
  overflow:hidden;
}
.hdr::before{
  content:'🥭 🥝 🍉 🍍 🥥 🍹 🍊 🍋 🫐 🍓';
  position:absolute;top:-8px;left:0;right:0;
  font-size:1.1rem;letter-spacing:2px;opacity:.25;
  white-space:nowrap;overflow:hidden;
}
.hdr h1{font-size:1.6rem;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.15);position:relative}
.hdr p{font-size:.82rem;opacity:.9;margin-top:5px;position:relative;font-weight:500}

/* ── CARDS ── */
.card{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:18px;
  box-shadow:0 4px 24px rgba(255,107,53,.1), 0 1px 4px rgba(0,0,0,.06);
  margin-bottom:12px;
  border:1.5px solid rgba(255,200,100,.25);
}

/* ── BUTTONS ── */
.btn{
  display:block;padding:13px 20px;border-radius:14px;border:none;
  font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;transition:all .2s;width:100%;margin-top:10px;
  text-align:center;letter-spacing:.3px;
}
.btn-sun{
  background:linear-gradient(135deg,#FF6B35,#FF8E53,#FFC341);
  color:#fff;
  box-shadow:0 5px 18px rgba(255,107,53,.4);
}
.btn-sun:active{transform:scale(.97)}
.btn-gray{background:#f0ede8;color:#555;box-shadow:none}
.btn-red{background:linear-gradient(135deg,#ff5252,#ff1744);color:#fff;box-shadow:0 4px 14px rgba(255,23,68,.3)}
.btn-sm{padding:7px 14px;font-size:.83rem;width:auto;margin-top:0;display:inline-block}

/* ── FORM ── */
.fld{margin-bottom:10px}
.fld label{display:block;font-weight:700;font-size:.87rem;color:#7a4e2d;margin-bottom:4px}
.fld input,.fld select{
  width:100%;padding:11px 14px;
  border:2px solid #FFD5A8;
  border-radius:13px;
  font-family:'Tajawal',sans-serif;font-size:.95rem;
  outline:none;transition:border .2s,box-shadow .2s;
  background:#FFFAF5;color:#2d1b00;
}
.fld input:focus,.fld select:focus{
  border-color:#FF8E53;
  box-shadow:0 0 0 3px rgba(255,142,83,.15);
}
.err{color:#e53935;font-size:.83rem;margin-top:5px;display:none;font-weight:700;background:#fff0f0;padding:6px 10px;border-radius:10px;border-right:3px solid #e53935}
.err.on{display:block}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:12px;background:rgba(255,255,255,.6);padding:5px;border-radius:16px;border:1.5px solid rgba(255,200,100,.3)}
.tab{
  flex:1;padding:9px 6px;text-align:center;border-radius:12px;
  background:transparent;cursor:pointer;font-weight:700;font-size:.83rem;
  transition:all .2s;color:#a0754a;
}
.tab.on{
  background:linear-gradient(135deg,#FF6B35,#FFC341);
  color:#fff;
  box-shadow:0 3px 12px rgba(255,107,53,.35);
}

/* ── TASK ITEMS ── */
.ti{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border-radius:16px;
  border:2px solid #FFE0C0;
  margin-bottom:9px;cursor:pointer;
  transition:all .22s;user-select:none;
  background:#FFFAF5;
}
.ti:active{transform:scale(.98)}
.ti.done{background:linear-gradient(135deg,#FFF3E0,#FFF8E1);border-color:#FFA726}
.ti .ico{font-size:1.8rem;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.ti .nm{flex:1;font-weight:800;font-size:.92rem;color:#3d2200}
.ti .pts{font-size:.76rem;color:#c08040;font-weight:600;margin-top:2px}
.chk{
  width:28px;height:28px;border-radius:50%;
  border:2px solid #FFD0A0;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;flex-shrink:0;transition:all .25s;
  background:#fff;
}
.ti.done .chk{
  background:linear-gradient(135deg,#FF8E53,#FFC341);
  border-color:#FF8E53;color:#fff;font-weight:900;
  box-shadow:0 2px 8px rgba(255,142,83,.4);
}

/* ── SCORE BADGE ── */
.sbadge{
  background:linear-gradient(135deg,#FF6B35,#FFC341);
  color:#fff;padding:10px 26px;border-radius:50px;
  font-weight:900;font-size:1.2rem;display:inline-block;
  box-shadow:0 5px 20px rgba(255,107,53,.4);
  text-shadow:0 1px 4px rgba(0,0,0,.15);
}

/* ── LEADERBOARD ── */
.lbr{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:16px;
  background:#FFFAF5;margin-bottom:8px;
  border:1.5px solid #FFE8CC;
  transition:all .2s;
}
.lbr.me{background:linear-gradient(135deg,#FFF3E0,#FFF8E1);border-color:#FFA726;box-shadow:0 3px 12px rgba(255,167,38,.2)}
.lbr .rank{font-size:1.3rem;width:34px;text-align:center;flex-shrink:0}
.lbr .nm{flex:1;font-weight:700;font-size:.92rem;color:#3d2200}
.lbr .sc{
  font-weight:900;font-size:.95rem;
  background:linear-gradient(135deg,#FF6B35,#FFC341);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── DAY BADGE ── */
.dbadge{display:inline-block;padding:5px 16px;border-radius:50px;font-size:.82rem;font-weight:800;margin-top:6px}
.dbadge.task{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);color:#1b5e20;box-shadow:0 2px 8px rgba(0,128,0,.12)}
.dbadge.review{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);color:#0d47a1;box-shadow:0 2px 8px rgba(13,71,161,.12)}
.dbadge.exam{background:linear-gradient(135deg,#FCE4EC,#F8BBD0);color:#880e4f;box-shadow:0 2px 8px rgba(136,14,79,.12)}
.dbadge.rest{background:linear-gradient(135deg,#EDE7F6,#D1C4E9);color:#311b92;box-shadow:0 2px 8px rgba(49,27,146,.12)}

/* ── WEEK CARD ── */
.wk-big{font-size:2.2rem;font-weight:900;
  background:linear-gradient(135deg,#FF6B35,#FFC341);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:linear-gradient(135deg,#FF6B35,#FFC341);
  color:#fff;padding:12px 24px;border-radius:50px;
  font-family:'Tajawal',sans-serif;font-weight:800;font-size:.95rem;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999;white-space:nowrap;pointer-events:none;
  box-shadow:0 6px 24px rgba(255,107,53,.45);
}
#toast.on{transform:translateX(-50%) translateY(0)}

/* ── ADMIN ROW ── */
.arow{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:13px;
  background:#FFFAF5;margin-bottom:6px;
  border:1.5px solid #FFE8CC;
}
.arow .anm{flex:1;font-weight:700;font-size:.87rem;color:#3d2200}
.role-tag{font-size:.73rem;padding:3px 10px;border-radius:50px;font-weight:700}
.role-sup{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.role-hf{background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7}

hr{border:none;border-top:1.5px dashed #FFE0B2;margin:14px 0}
h3{font-size:1.05rem;font-weight:800;margin-bottom:12px;color:#3d2200}
h4{font-size:.92rem;font-weight:700;margin-bottom:8px;color:#a0754a}

/* ── SUPERVISOR HEADER ── */
.hdr-sup{
  background:linear-gradient(135deg,#7B1FA2 0%,#AB47BC 40%,#FF6B35 100%);
  box-shadow:0 8px 30px rgba(123,31,162,.3);
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- =============== LOGIN =============== -->
<div id="vLogin" class="view active">
<div class="page">
  <div class="hdr">
    <h1>🍹 يُنعشني إنجازي</h1>
    <p>حلقة حفظ القرآن الكريم</p>
  </div>

  <div class="tabs" id="lgTabs">
    <div class="tab on" onclick="lgTab('in')">تسجيل الدخول</div>
    <div class="tab" onclick="lgTab('up')">حساب جديد</div>
  </div>

  <!-- Login -->
  <div id="pIn" class="card">
    <div class="fld"><label>اسم المستخدم</label><input id="lU" type="text" placeholder="username" autocomplete="username"></div>
    <div class="fld"><label>كلمة المرور</label><input id="lP" type="password" placeholder="••••" autocomplete="current-password"></div>
    <div id="lE" class="err"></div>
    <button class="btn btn-sun" onclick="doLogin()">دخول 🍹</button>
  </div>

  <!-- Register -->
  <div id="pUp" class="card" style="display:none">
    <div class="fld"><label>الاسم الكامل</label><input id="rN" type="text" placeholder="اسمك"></div>
    <div class="fld"><label>اسم المستخدم</label><input id="rU" type="text" placeholder="username بدون مسافات" autocomplete="username"></div>
    <div class="fld"><label>كلمة المرور</label><input id="rP" type="password" placeholder="٤ أحرف على الأقل" autocomplete="new-password"></div>
    <div class="fld">
      <label>الدور</label>
      <select id="rR" onchange="chkRole()">
        <option value="hafiza">حافظة</option>
        <option value="supervisor">مشرفة</option>
      </select>
    </div>
    <div id="codeWrap" class="fld" style="display:none">
      <label>كود المشرفة</label>
      <input id="rC" type="password" placeholder="أدخلي الكود">
    </div>
    <div id="rE" class="err"></div>
    <button class="btn btn-sun" onclick="doReg()">إنشاء حساب 🌴</button>
  </div>
</div>
</div>

<!-- =============== HAFIZA =============== -->
<div id="vHf" class="view">
<div class="page">
  <div class="hdr">
    <h1 id="hfTitle"></h1>
    <p id="hfDate"></p>
  </div>

  <div class="tabs" id="hfTabs">
    <div class="tab on" onclick="hfTab('day')">اليوم</div>
    <div class="tab" onclick="hfTab('my')">إنجازاتي</div>
    <div class="tab" onclick="hfTab('lb')">المتصدرات</div>
  </div>

  <div id="hfDay"></div>
  <div id="hfMy" style="display:none"></div>
  <div id="hfLb" style="display:none"></div>

  <button class="btn btn-gray" onclick="logout()">تسجيل الخروج</button>
</div>
</div>

<!-- =============== SUPERVISOR =============== -->
<div id="vSup" class="view">
<div class="page">
  <div class="hdr hdr-sup">
    <h1>🌸 لوحة المشرفة</h1>
    <p id="supName"></p>
  </div>

  <div class="tabs" id="supTabs">
    <div class="tab on" onclick="supTab('lb')">المتصدرات</div>
    <div class="tab" onclick="supTab('ex')">الاختبارات</div>
    <div class="tab" onclick="supTab('adm')">الإدارة</div>
  </div>

  <div id="supLb"></div>
  <div id="supEx" style="display:none"></div>
  <div id="supAdm" style="display:none"></div>

  <button class="btn btn-gray" onclick="logout()">تسجيل الخروج</button>
</div>
</div>

<!-- =============== FIREBASE =============== -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
'use strict';

/* ---- FIREBASE INIT ---- */
firebase.initializeApp({
  apiKey:"AIzaSyClFXETV5rNX5-zTAr0oW09bLLnkG016Kk",
  authDomain:"quran-3hd.firebaseapp.com",
  projectId:"quran-3hd",
  storageBucket:"quran-3hd.firebasestorage.app",
  messagingSenderId:"732760853628",
  appId:"1:732760853628:web:b41cdfe0e05397a6414df9"
});
var db = firebase.firestore();
db.settings({ experimentalForceLongPolling: true, merge: true });

/* ---- CONFIG ---- */
var SUP_CODE  = '2026';
var START     = new Date('2026-06-28T00:00:00');
var WEEKS     = 5;
var T_PTS     = 5;   // points per task
var E_PTS_MAX = 10;  // max exam points

var TASKS = [
  { id:'t1', name:'السرد الذاتي',       icon:'🥭' },
  { id:'t2', name:'السرد على الرفيقة', icon:'🥝' },
  { id:'t3', name:'التكرار ٣ مرات',    icon:'🍉' },
  { id:'t4', name:'ورد الصلاة',        icon:'🍍' },
  { id:'t5', name:'السرد التراكمي',    icon:'🥥' }
];

var ADMIN = { id:'s0', name:'المشرفة الرئيسية', username:'admin', password:'admin123', role:'supervisor', createdAt: new Date().toISOString() };

/* ---- STATE ---- */
var _data = { users:{}, entries:{}, exams:{} };
var _fbReady = false;
var me = null;
var _cur = [false,false,false,false,false]; // current task checkboxes

/* ---- UTILS ---- */
function uid(){ return 'u' + Date.now() + Math.random().toString(36).slice(2,5); }
function ts(){ return new Date().toISOString(); }
function $id(id){ return document.getElementById(id); }
function val(id){ return $id(id).value; }
function sval(id,v){ $id(id).value = v; }
function ihtml(id,h){ $id(id).innerHTML = h; }
function show(id){ $id(id).style.display = ''; }
function hide(id){ $id(id).style.display = 'none'; }

function showErr(id, msg){
  var el = $id(id);
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(function(){ el.classList.remove('on'); }, 4000);
}

var _tT;
function toast(msg){
  var el = $id('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_tT);
  _tT = setTimeout(function(){ el.classList.remove('on'); }, 2500);
}

/* ---- DATE HELPERS ---- */
function today(){
  var n = new Date();
  if(n.getHours() < 17) n.setDate(n.getDate()-1);
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function dKey(d){
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

function wNum(d){
  var diff = d - START;
  if(diff < 0) return 0;
  return Math.floor(diff / (7*24*3600*1000)) + 1;
}

function dType(d){
  var w = d.getDay();
  if(w === 5) return 'rest';
  if(w === 6) return 'exam';
  if(w === 4) return 'review';
  return 'task';
}

function dLabel(t){
  return { task:'يوم مهام ✅', review:'يوم مراجعة 📖', exam:'يوم اختبار 📝', rest:'يوم راحة 🌙' }[t] || t;
}

var AR_DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
function arDate(d){
  return AR_DAYS[d.getDay()] + ' ' + d.toLocaleDateString('ar-SA');
}

/* ---- LOCALSTORAGE ---- */
function lsLoad(){
  try {
    var u = localStorage.getItem('qc_users');
    var e = localStorage.getItem('qc_entries');
    var x = localStorage.getItem('qc_exams');
    if(u) _data.users   = JSON.parse(u);
    if(e) _data.entries = JSON.parse(e);
    if(x) _data.exams   = JSON.parse(x);
  } catch(err){ console.warn('lsLoad',err); }
}

function lsSave(){
  try {
    localStorage.setItem('qc_users',   JSON.stringify(_data.users));
    localStorage.setItem('qc_entries', JSON.stringify(_data.entries));
    localStorage.setItem('qc_exams',   JSON.stringify(_data.exams));
  } catch(err){ console.warn('lsSave',err); }
}

/* ---- FIREBASE WRITE (fire-and-forget) ---- */
function fbSet(col, key, obj){
  db.collection(col).doc(key).set(obj).catch(function(e){ console.warn('fbSet',col,key,e); });
}

function fbDel(col, key){
  db.collection(col).doc(key).delete().catch(function(e){ console.warn('fbDel',col,key,e); });
}

/* ---- DATA WRITE (localStorage + Firebase) ---- */
function dWrite(col, key, obj){
  _data[col][key] = obj;
  lsSave();
  fbSet(col, key, obj);
}

/* ---- ADMIN BOOTSTRAP ---- */
function ensureAdmin(){
  var has = Object.values(_data.users).some(function(u){ return u.username === 'admin'; });
  if(!has){
    _data.users['s0'] = ADMIN;
    lsSave();
    fbSet('users','s0',ADMIN);
  }
}

/* ---- INIT APP ---- */
function initApp(){
  // 1. Load localStorage immediately (instant, synchronous)
  lsLoad();
  // 2. Ensure admin is always available without Firebase
  ensureAdmin();

  // 3. Firebase loads in background for multi-device sync
  Promise.all([
    db.collection('users').get(),
    db.collection('entries').get(),
    db.collection('exams').get()
  ]).then(function(res){
    // Firebase is source of truth — overwrite localStorage data
    res[0].forEach(function(d){ _data.users[d.id]   = d.data(); });
    res[1].forEach(function(d){ _data.entries[d.id] = d.data(); });
    res[2].forEach(function(d){ _data.exams[d.id]   = d.data(); });
    lsSave(); // persist Firebase data to localStorage
    _fbReady = true;
    ensureAdmin();
    autoZero().catch(function(e){ console.warn('autoZero',e); });
    // Refresh current view if logged in
    if(me){ me.role === 'supervisor' ? renderSup() : renderHf(); }
  }).catch(function(e){
    console.warn('Firebase load failed:',e);
    // App still works from localStorage — just not synced
  });
}

/* ---- AUTO ZERO ABSENTS ---- */
function autoZero(){
  var td = today();
  var users = Object.values(_data.users).filter(function(u){ return u.role === 'hafiza'; });
  var proms = [];

  for(var d = new Date(START); d <= td; d.setDate(d.getDate()+1)){
    var dt = dType(d);
    if(dt !== 'task') continue;
    var dk = dKey(new Date(d));
    users.forEach(function(u){
      var ek = u.id + '_' + dk;
      if(!_data.entries[ek]){
        var ent = { userId:u.id, date:dk, tasks:[false,false,false,false,false], submitted:true, absent:true, ts:ts() };
        _data.entries[ek] = ent;
        proms.push(db.collection('entries').doc(ek).set(ent));
      }
    });
  }
  lsSave();
  return Promise.all(proms);
}

/* ---- SCORING ---- */
function score(userId){
  var tot = 0;
  Object.values(_data.entries).forEach(function(e){
    if(e.userId === userId && e.tasks){
      e.tasks.forEach(function(t){ if(t) tot += T_PTS; });
    }
  });
  Object.values(_data.exams).forEach(function(e){
    if(e.userId === userId) tot += (e.score || 0);
  });
  return tot;
}

/* ---- VIEW SWITCH ---- */
function showView(id){
  ['vLogin','vHf','vSup'].forEach(function(v){
    $id(v).classList.remove('active');
  });
  $id(id).classList.add('active');
  window.scrollTo(0,0);
}

function logout(){
  me = null;
  showView('vLogin');
  sval('lU',''); sval('lP','');
}

/* ---- LOGIN TABS ---- */
function lgTab(t){
  if(t === 'in'){
    show('pIn'); hide('pUp');
    var tabs = $id('lgTabs').querySelectorAll('.tab');
    tabs[0].classList.add('on'); tabs[1].classList.remove('on');
  } else {
    hide('pIn'); show('pUp');
    var tabs = $id('lgTabs').querySelectorAll('.tab');
    tabs[0].classList.remove('on'); tabs[1].classList.add('on');
  }
}

function chkRole(){
  val('rR') === 'supervisor' ? show('codeWrap') : hide('codeWrap');
}

/* ---- DO LOGIN ---- */
function doLogin(){
  var u = val('lU').trim().toLowerCase();
  var p = val('lP');
  if(!u || !p){ showErr('lE','يرجى تعبئة جميع الحقول'); return; }

  var found = null;
  Object.values(_data.users).forEach(function(usr){
    if(usr.username && usr.username.toLowerCase() === u && usr.password === p) found = usr;
  });

  if(!found){
    if(!_fbReady){
      showErr('lE','⏳ جاري تحميل البيانات من السحابة — انتظري ثانية وحاولي مجدداً');
    } else {
      showErr('lE','❌ اسم المستخدم أو كلمة المرور غير صحيحة');
    }
    return;
  }

  me = found;
  sval('lU',''); sval('lP','');
  found.role === 'supervisor' ? showSup() : showHf();
}

/* ---- DO REGISTER ---- */
function doReg(){
  var name  = val('rN').trim();
  var uname = val('rU').trim().toLowerCase();
  var pass  = val('rP');
  var role  = val('rR');
  var code  = val('rC');

  if(!name || !uname || !pass){ showErr('rE','يرجى تعبئة جميع الحقول'); return; }
  if(uname.indexOf(' ') !== -1){ showErr('rE','اسم المستخدم بدون مسافات'); return; }
  if(pass.length < 4){ showErr('rE','كلمة المرور ٤ أحرف على الأقل'); return; }
  if(role === 'supervisor' && code !== SUP_CODE){ showErr('rE','❌ كود المشرفة غير صحيح'); return; }

  var dup = Object.values(_data.users).some(function(u){ return u.username && u.username.toLowerCase() === uname; });
  if(dup){ showErr('rE','❌ اسم المستخدم مستخدم — اختاري غيره'); return; }

  var id = uid();
  var obj = { id:id, name:name, username:uname, password:pass, role:role, createdAt:ts() };
  dWrite('users', id, obj);  // saves to localStorage immediately + Firebase background
  me = obj;
  toast('🎉 تم إنشاء الحساب!');
  setTimeout(function(){ role === 'supervisor' ? showSup() : showHf(); }, 400);
}

/* ================================================================
   HAFIZA VIEW
   ================================================================ */
function showHf(){
  showView('vHf');
  hfTab('day');
}

function hfTab(t){
  ['day','my','lb'].forEach(function(x, i){
    $id('hf'+x.charAt(0).toUpperCase()+x.slice(1)).style.display = (x===t)?'':'none';
    $id('hfTabs').querySelectorAll('.tab')[i].classList.toggle('on', x===t);
  });
  if(t==='day') renderHfDay();
  if(t==='my')  renderHfMy();
  if(t==='lb')  renderHfLb();
}

function renderHf(){
  var ct = $id('hfTabs').querySelector('.tab.on');
  var idx = Array.from($id('hfTabs').querySelectorAll('.tab')).indexOf(ct);
  var tabs = ['day','my','lb'];
  hfTab(tabs[idx] || 'day');
}

function renderHfDay(){
  var td = today();
  var dt = dType(td);
  $id('hfTitle').textContent = '🌸 ' + me.name;
  $id('hfDate').textContent  = arDate(td);

  var h = '<div class="card" style="text-align:center;margin-bottom:14px;background:linear-gradient(135deg,rgba(255,248,238,.95),rgba(255,240,220,.95))">';
  h += '<div class="wk-big">الأسبوع ' + wNum(td) + '</div>';
  h += '<div style="font-size:.8rem;color:#c08040;font-weight:600;margin-top:2px">من ' + WEEKS + ' أسابيع</div>';
  h += '<span class="dbadge '+dt+'">' + dLabel(dt) + '</span>';
  h += '</div>';

  if(dt === 'rest'){
    h += '<div class="card" style="text-align:center"><p style="font-size:2.5rem">🌙</p><p style="font-weight:800;margin-top:8px;font-size:1rem">يوم الجمعة — راحة مباركة!</p></div>';
    ihtml('hfDay', h);
    return;
  }

  if(dt === 'review'){
    h += '<div class="card" style="text-align:center"><p style="font-size:2.5rem">📖</p><p style="font-weight:800;margin-top:8px;font-size:1rem">يوم المراجعة</p><p style="color:#888;margin-top:6px;font-size:.9rem">راجعي محفوظاتك اليوم</p></div>';
    ihtml('hfDay', h);
    return;
  }

  if(dt === 'exam'){
    var wk = wNum(td);
    var ek = me.id + '_w' + wk;
    var ex = _data.exams[ek];
    if(ex !== undefined && ex !== null){
      h += '<div class="card" style="text-align:center"><p style="font-size:2rem">📝</p><p style="font-weight:800;margin-top:8px">نتيجة الاختبار — الأسبوع '+wk+'</p><div class="sbadge" style="margin-top:12px">'+ex.score+' / 10 نقطة</div></div>';
    } else {
      h += '<div class="card" style="text-align:center"><p style="font-size:2rem">📝</p><p style="font-weight:800;margin-top:8px">يوم الاختبار</p><p style="color:#888;margin-top:6px;font-size:.9rem">ستظهر نتيجتك بعد تسجيلها من المشرفة</p></div>';
    }
    ihtml('hfDay', h);
    return;
  }

  // ---- TASK DAY ----
  var dk = dKey(td);
  var ek2 = me.id + '_' + dk;
  var ent = _data.entries[ek2];

  if(ent && ent.submitted && !ent.absent){
    // Already submitted — show results
    h += '<div class="card">';
    h += '<h3 style="color:#2e7d32">✅ تم تسجيل مهامك!</h3>';
    TASKS.forEach(function(t, i){
      var done = ent.tasks && ent.tasks[i];
      h += '<div class="ti '+(done?'done':'')+'" style="cursor:default">';
      h += '<span class="ico">'+t.icon+'</span>';
      h += '<div class="nm">'+t.name+'</div>';
      h += '<div class="chk">'+(done?'✓':'')+'</div>';
      h += '</div>';
    });
    var cnt = ent.tasks ? ent.tasks.filter(Boolean).length : 0;
    h += '<p style="text-align:center;margin-top:10px;color:#2e7d32;font-weight:700">'+cnt+' من 5 مهام — '+cnt*T_PTS+' نقطة</p>';
    h += '</div>';
    ihtml('hfDay', h);
    return;
  }

  // Task entry form
  _cur = (ent && ent.tasks) ? ent.tasks.slice() : [false,false,false,false,false];
  h += buildTaskForm(dk);
  ihtml('hfDay', h);
}

function buildTaskForm(dk){
  var h = '<div class="card"><h3>📋 مهام اليوم</h3>';
  TASKS.forEach(function(t, i){
    var done = _cur[i];
    h += '<div class="ti '+(done?'done':'')+'" id="ti'+i+'" onclick="togTask('+i+',\''+dk+'\')">';
    h += '<span class="ico">'+t.icon+'</span>';
    h += '<div><div class="nm">'+t.name+'</div><div class="pts">'+T_PTS+' نقاط</div></div>';
    h += '<div class="chk">'+(done?'✓':'')+'</div>';
    h += '</div>';
  });
  h += '<button class="btn btn-sun" style="margin-top:6px" onclick="submitTasks(\''+dk+'\')">✅ حفظ المهام</button>';
  h += '</div>';
  return h;
}

function togTask(i, dk){
  _cur[i] = !_cur[i];
  var el = $id('ti'+i);
  el.classList.toggle('done', _cur[i]);
  el.querySelector('.chk').textContent = _cur[i] ? '✓' : '';
}

function submitTasks(dk){
  var ek = me.id + '_' + dk;
  var obj = { userId:me.id, date:dk, tasks:_cur.slice(), submitted:true, absent:false, ts:ts() };
  dWrite('entries', ek, obj);
  toast('✅ تم حفظ مهامك!');
  setTimeout(function(){ renderHfDay(); }, 300);
}

function renderHfMy(){
  var total = score(me.id);
  var h = '<div class="card" style="text-align:center">';
  h += '<p style="color:#888;font-size:.88rem;margin-bottom:8px">مجموع نقاطي</p>';
  h += '<div class="sbadge">'+total+' نقطة</div>';
  h += '</div>';

  h += '<div class="card">';
  h += '<h3>📅 سجل الأسابيع</h3>';

  for(var w = 1; w <= WEEKS; w++){
    var wStart = new Date(START.getTime() + (w-1)*7*24*3600*1000);
    var wEnd   = new Date(wStart.getTime() + 7*24*3600*1000);
    var wScore = 0;
    h += '<div style="margin-bottom:14px"><p style="font-weight:800;color:#2e7d32;margin-bottom:6px;font-size:.95rem">الأسبوع '+w+'</p>';

    for(var d = new Date(wStart); d < wEnd; d.setDate(d.getDate()+1)){
      var dt = dType(d);
      if(dt !== 'task') continue;
      var snap = new Date(d);
      var dk = dKey(snap);
      var ek = me.id + '_' + dk;
      var ent = _data.entries[ek];
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:7px 10px;background:#f7f7f7;border-radius:10px">';
      h += '<span style="flex:1;font-size:.82rem;color:#555">'+arDate(snap)+'</span>';
      if(!ent){
        h += '<span style="font-size:.8rem;color:#bbb">—</span>';
      } else if(ent.absent){
        h += '<span style="font-size:.8rem;color:#e53935;font-weight:700">غائبة</span>';
      } else {
        var cnt = ent.tasks ? ent.tasks.filter(Boolean).length : 0;
        wScore += cnt * T_PTS;
        h += '<span style="font-size:.82rem;color:#2e7d32;font-weight:700">'+cnt+'/5 ('+cnt*T_PTS+' ن)</span>';
      }
      h += '</div>';
    }

    var exK = me.id + '_w' + w;
    var ex = _data.exams[exK];
    if(ex){
      wScore += ex.score || 0;
      h += '<div style="background:#fce4ec;border-radius:10px;padding:7px 10px;margin-bottom:4px;font-size:.82rem;font-weight:700;color:#b71c1c">📝 اختبار: '+ex.score+'/10</div>';
    }

    h += '<div style="font-size:.82rem;color:#43a047;font-weight:700;text-align:left;padding:0 4px">المجموع: '+wScore+' نقطة</div>';
    h += '</div>';
  }

  h += '</div>';
  ihtml('hfMy', h);
}

function renderHfLb(){
  var users = Object.values(_data.users).filter(function(u){ return u.role === 'hafiza'; });
  users.sort(function(a,b){ return score(b.id)-score(a.id); });
  var medals = ['🥇','🥈','🥉'];

  var h = '<div class="card"><h3>🏆 المتصدرات</h3>';
  if(!users.length){
    h += '<p style="color:#bbb;text-align:center">لا توجد حافظات بعد</p>';
  } else {
    users.forEach(function(u,i){
      var isMe = u.id === me.id;
      h += '<div class="lbr'+(isMe?' me':'')+'">';
      h += '<div class="rank">'+(medals[i]||(i+1))+'</div>';
      h += '<div class="nm">'+u.name+(isMe?' 👈':'')+'</div>';
      h += '<div class="sc">'+score(u.id)+' ن</div>';
      h += '</div>';
    });
  }
  h += '</div>';
  ihtml('hfLb', h);
}

/* ================================================================
   SUPERVISOR VIEW
   ================================================================ */
function showSup(){
  showView('vSup');
  $id('supName').textContent = me.name;
  supTab('lb');
}

function supTab(t){
  ['lb','ex','adm'].forEach(function(x, i){
    var nm = x === 'lb' ? 'supLb' : x === 'ex' ? 'supEx' : 'supAdm';
    $id(nm).style.display = (x===t)?'':'none';
    $id('supTabs').querySelectorAll('.tab')[i].classList.toggle('on', x===t);
  });
  if(t==='lb')  renderSupLb();
  if(t==='ex')  renderSupEx();
  if(t==='adm') renderSupAdm();
}

function renderSup(){
  var tabs = $id('supTabs').querySelectorAll('.tab');
  var cur = Array.from(tabs).findIndex(function(t){ return t.classList.contains('on'); });
  var key = ['lb','ex','adm'][cur] || 'lb';
  supTab(key);
}

function renderSupLb(){
  var users = Object.values(_data.users).filter(function(u){ return u.role === 'hafiza'; });
  users.sort(function(a,b){ return score(b.id)-score(a.id); });
  var medals = ['🥇','🥈','🥉'];

  var h = '<div class="card"><h3>🏆 ترتيب الحافظات</h3>';
  if(!users.length){
    h += '<p style="color:#bbb;text-align:center;font-size:.9rem">لا توجد حافظات بعد</p>';
  } else {
    users.forEach(function(u,i){
      h += '<div class="lbr">';
      h += '<div class="rank">'+(medals[i]||(i+1))+'</div>';
      h += '<div class="nm">'+u.name+'<br><span style="font-size:.75rem;color:#999">@'+u.username+'</span></div>';
      h += '<div class="sc">'+score(u.id)+' ن</div>';
      h += '</div>';
    });
  }
  h += '</div>';
  ihtml('supLb', h);
}

function renderSupEx(){
  var users = Object.values(_data.users).filter(function(u){ return u.role === 'hafiza'; });
  var h = '<div class="card"><h3>📝 درجات الاختبارات</h3>';

  if(!users.length){
    h += '<p style="color:#bbb;text-align:center;font-size:.9rem">لا توجد حافظات</p></div>';
    ihtml('supEx', h);
    return;
  }

  for(var w = 1; w <= WEEKS; w++){
    h += '<div style="margin-bottom:16px"><h4 style="color:#b71c1c">الأسبوع '+w+'</h4>';
    users.forEach(function(u){
      var exK = u.id + '_w' + w;
      var ex  = _data.exams[exK];
      var sc  = ex ? ex.score : '';
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      h += '<span style="flex:1;font-weight:700;font-size:.88rem">'+u.name+'</span>';
      h += '<input type="number" min="0" max="10" value="'+sc+'" placeholder="—" ';
      h += 'style="width:68px;padding:6px;text-align:center;margin:0;border-radius:10px;border:2px solid #ddd;font-family:\'Tajawal\',sans-serif;font-size:.9rem" ';
      h += 'onchange="setExam(\''+u.id+'\','+w+',this.value)">';
      h += '<span style="font-size:.8rem;color:#888">/ 10</span>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  ihtml('supEx', h);
}

function setExam(userId, week, v){
  var sc = Math.max(0, Math.min(10, parseInt(v,10) || 0));
  var exK = userId + '_w' + week;
  var obj = { userId:userId, week:week, score:sc, ts:ts() };
  dWrite('exams', exK, obj);
  toast('✅ تم حفظ الدرجة');
}

function renderSupAdm(){
  var h = '';

  // Admin-only panel
  if(me.username === 'admin'){
    h += '<div class="card">';
    h += '<h3>⚙️ إدارة المستخدمين</h3>';
    h += '<div id="adminList"></div>';
    h += '<hr>';
    h += '<h4>إضافة حافظة يدوياً</h4>';
    h += '<div class="fld"><label>الاسم</label><input id="aN" type="text" placeholder="الاسم"></div>';
    h += '<div class="fld"><label>اسم المستخدم</label><input id="aU" type="text" placeholder="username"></div>';
    h += '<div class="fld"><label>كلمة المرور</label><input id="aP" type="password" placeholder="كلمة المرور"></div>';
    h += '<div id="aE" class="err"></div>';
    h += '<button class="btn btn-sun btn-sm" style="display:block;width:auto" onclick="addUser()">إضافة +</button>';
    h += '</div>';
  }

  // All supervisors: view hafizas
  h += '<div class="card"><h3>👥 الحافظات</h3><div id="hfList"></div></div>';
  ihtml('supAdm', h);

  if(me.username === 'admin') renderAdminList();
  renderHfList();
}

function renderAdminList(){
  var users = Object.values(_data.users).filter(function(u){ return u.username !== 'admin'; });
  var h = '';
  users.forEach(function(u){
    h += '<div class="arow">';
    h += '<div class="anm">'+u.name+' <span style="color:#aaa;font-size:.78rem">@'+u.username+'</span></div>';
    h += '<span class="role-tag role-'+(u.role==='supervisor'?'sup':'hf')+'">'+u.role+'</span>';
    h += '<button class="btn btn-red btn-sm" onclick="delUser(\''+u.id+'\')">حذف</button>';
    h += '</div>';
  });
  if(!users.length) h = '<p style="color:#bbb;font-size:.88rem">لا يوجد مستخدمون</p>';
  ihtml('adminList', h);
}

function renderHfList(){
  var users = Object.values(_data.users).filter(function(u){ return u.role === 'hafiza'; });
  var h = '';
  users.forEach(function(u){
    h += '<div class="arow">';
    h += '<div style="flex:1"><div class="anm">'+u.name+'</div><div style="font-size:.78rem;color:#aaa">@'+u.username+'</div></div>';
    h += '<span style="font-weight:800;color:#2e7d32;font-size:.95rem">'+score(u.id)+' ن</span>';
    h += '</div>';
  });
  if(!users.length) h = '<p style="color:#bbb;font-size:.88rem;text-align:center">لا توجد حافظات</p>';
  ihtml('hfList', h);
}

function addUser(){
  var name  = val('aN').trim();
  var uname = val('aU').trim().toLowerCase();
  var pass  = val('aP');

  if(!name || !uname || !pass){ showErr('aE','يرجى تعبئة جميع الحقول'); return; }
  if(pass.length < 4){ showErr('aE','كلمة المرور ٤ أحرف على الأقل'); return; }

  var dup = Object.values(_data.users).some(function(u){ return u.username && u.username.toLowerCase() === uname; });
  if(dup){ showErr('aE','❌ اسم المستخدم مستخدم'); return; }

  var id = uid();
  var obj = { id:id, name:name, username:uname, password:pass, role:'hafiza', createdAt:ts() };
  dWrite('users', id, obj);
  sval('aN',''); sval('aU',''); sval('aP','');
  toast('✅ تمت الإضافة');
  renderAdminList();
  renderHfList();
}

function delUser(userId){
  if(!confirm('حذف هذا المستخدم؟')) return;
  delete _data.users[userId];
  lsSave();
  fbDel('users', userId);
  toast('🗑️ تم الحذف');
  renderAdminList();
  renderHfList();
  renderSupLb();
}

/* ---- START ---- */
initApp();
</script>
</body>
</html>
