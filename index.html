<style>
:root{

}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Tajawal',sans-serif;min-height:100svh;direction:rtl;overflow-x:hidden;

@keyframes bgA{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}

.view{display:none}.view.active{display:block}
.wrap{max-width:520px;margin:0 auto;padding:0 14px calc(var(--nav-h)+16px+env(safe-area-inset-bottom));position:relative;z-index:1}
.lwrap{max-width:420px;margin:0 auto;padding:16px 16px 40px;position:relative;z-index:1}
.lhero{text-align:center;padding:40px 0 24px}
.hero-ring{width:100px;height:100px;background:linear-gradient(145deg,var(--t),var(--tl));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:52px;margin:0 auto 16px;box-shadow:0 6px 28px rgba(13,148,136,.4),0 0 0 8px rgba(13,148,136,.1);animation:pulse 2.8s ease-in-out infinite}

.htitle{font-size:30px;font-weight:900;line-height:1.1;margin-bottom:6px;background:linear-gradient(135deg,var(--t),var(--c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.card{background:var(--card);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--sh);border:1.5px solid var(--cb);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;background:linear-gradient(90deg,var(--t),var(--tl),var(--a),var(--c))}

.bf{width:100%}
.bt{background:linear-gradient(135deg,var(--t),var(--tl));color:#fff;box-shadow:0 4px 16px rgba(13,148,136,.38)}

.fg{margin-bottom:13px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--t);margin-bottom:5px}

.sctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.snum{font-size:40px;font-weight:900;color:var(--tx);line-height:1}
.slbl{font-size:11.5px;color:var(--mu);font-weight:600;margin-top:2px}

.spill{background:linear-gradient(135deg,rgba(204,251,241,.7),rgba(224,242,254,.6));border-radius:14px;padding:13px;text-align:center;border:1.5px solid rgba(20,184,166,.2)}
.spill .sv{font-size:28px;font-weight:900;color:var(--t)}
.spill .sl{font-size:11.5px;color:var(--mu);font-weight:600;margin-top:2px}

.pgbar{height:7px;background:rgba(204,251,241,.7);border-radius:5px;overflow:hidden;margin:4px 0}
.pgfill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--t),var(--tl),var(--a));transition:width .8s cubic-bezier(.4,0,.2,1)}
.wbadges{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.wbadges::-webkit-scrollbar{display:none}
.wbdg{flex-shrink:0;padding:7px 15px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid rgba(20,184,166,.25);color:var(--t);background:rgba(255,255,255,.75);white-space:nowrap;min-height:34px;transition:all .18s}

.pit{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:108px}
.pav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.8);box-shadow:0 3px 14px rgba(0,0,0,.12);width:46px;height:46px}
.pit.p1 .pav{width:58px;height:58px;font-size:24px;background:linear-gradient(145deg,#f59e0b,#fbbf24);box-shadow:0 5px 22px rgba(245,158,11,.4)}
.pit.p2 .pav{background:linear-gradient(145deg,#94a3b8,#cbd5e1)}
.pit.p3 .pav{background:linear-gradient(145deg,#f97316,#fb923c)}
.pmed{font-size:22px}
.pnm{font-size:12px;font-weight:700;color:var(--tx);text-align:center;line-height:1.3}
.psc{font-size:20px;font-weight:900;color:var(--t)}
.pbar{width:100%;border-radius:8px 8px 0 0}
.pit.p1 .pbar{height:72px;background:linear-gradient(180deg,rgba(251,191,36,.25),rgba(251,191,36,.05))}
.pit.p2 .pbar{height:52px;background:linear-gradient(180deg,rgba(148,163,184,.25),rgba(148,163,184,.05))}
.pit.p3 .pbar{height:40px;background:linear-gradient(180deg,rgba(249,115,22,.25),rgba(249,115,22,.05))}
.lbitem{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:14px;margin-bottom:7px;background:rgba(255,255,255,.75);border:1.5px solid rgba(13,148,136,.08)}
.lbitem.me{background:linear-gradient(135deg,rgba(204,251,241,.8),rgba(167,243,208,.55));border-color:var(--tl);box-shadow:0 0 0 2.5px rgba(20,184,166,.18)}
.lbrank{width:28px;height:28px;border-radius:50%;background:var(--t);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.lbav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--t),var(--tl));display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;flex-shrink:0}
.lbinf{flex:1;min-width:0}
.lbnm{font-size:14px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbbar-w{margin-top:4px;height:4px;background:rgba(13,148,136,.1);border-radius:3px;overflow:hidden}
.lbbar-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--t),var(--tl))}
.lbsr{text-align:center;flex-shrink:0}
.lbnum{font-size:19px;font-weight:900;color:var(--t)}
.lbden{font-size:10px;color:var(--mu)}
.irow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(13,148,136,.07);font-size:13.5px;color:var(--tx)}

.ilbl{color:var(--mu);font-size:11.5px;margin-top:2px}
.stblw{overflow-x:auto;border-radius:14px;-webkit-overflow-scrolling:touch}
.stbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;min-width:480px}

.exi:focus{outline:none;border-color:var(--tl)}
.mov{position:fixed;inset:0;background:rgba(10,38,40,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;animation:fIn .2s ease}

.xhd{text-align:center;color:#fff;margin-bottom:22px}

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="vLogin" class="view active">
<div class="lwrap">
  <div class="lhero">
    <div class="hero-ring">🍹</div>
    <div class="htitle">يُنعشني إنجازي</div>
    <div class="hsub">حلقة مراجعة القرآن الكريم ١٤٤٧هـ</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tabbtn active" onclick="swTab('l')">دخول</button>
      <button class="tabbtn" onclick="swTab('r')">حساب جديد</button>
    </div>
    <!-- دخول -->
    <div id="fL">
      <div class="fg"><label class="fl">📱 اسم المستخدم</label>
        <input id="lU" class="fi" placeholder="أدخلي اسمك" autocomplete="username"></div>
      <div class="fg"><label class="fl">🔒 كلمة المرور</label>
        <input id="lP" type="password" class="fi" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn bt bf" onclick="doLogin()">دخول ☀️</button>
      <div id="lE" class="hidden" style="color:#ef4444;font-size:13px;margin-top:9px;text-align:center"></div>
    </div>
    <!-- تسجيل -->
    <div id="fR" class="hidden">
      <div class="fg"><label class="fl">✨ الاسم الكامل</label>
        <input id="rN" class="fi" placeholder="اسمك الكامل"></div>
      <div class="fg"><label class="fl">📱 اسم مستخدم للدخول</label>
        <input id="rU" class="fi" placeholder="بدون مسافات"></div>
      <div class="fg"><label class="fl">🔒 كلمة المرور</label>
        <input id="rP" type="password" class="fi" placeholder="٤ أحرف على الأقل"></div>
      <div class="fg"><label class="fl">👤 نوع الحساب</label>
        <select id="rR" class="fi" onchange="togSup()">
          <option value="hafiza">حافظة 📖</option>
          <option value="supervisor">مشرفة 🌟</option>
        </select></div>
      <div id="scG" class="fg hidden"><label class="fl">🔑 كود المشرفة</label>
        <input id="rC" type="password" class="fi" placeholder="أدخلي كود المشرفة"></div>
      <button class="btn bc bf" onclick="doReg()">إنشاء الحساب 🎉</button>
      <div id="rE" class="hidden" style="color:#ef4444;font-size:13px;margin-top:9px;text-align:center"></div>
    </div>

/* ═══ FIREBASE WRITE — fire and forget, never block UI ═══ */

}
function fbDel(col, key) {

}

/* ═══ CONFIG ═══ */
var START = new Date('2026-06-28T00:00:00');

  {id:'t2',name:'السرد على الرفيقة',icon:'🥝',desc:'بدون أخطاء، وإذا حصل خطأ يُعاد الوجه من بدايته'},
  {id:'t3',name:'التكرار ٣ مرات',icon:'🍉',desc:'بعد سرد الرفيقة'},

/* ═══ AUTH ═══ */

/* ═══ DATE HELPERS ═══ */
function getEffectiveDate() {
  var now = new Date();
  var cutoff = new Date(now); cutoff.setHours(17,0,0,0);
  if (now < cutoff) { var y = new Date(now); y.setDate(y.getDate()-1); return y; }
  return now;
}
function dayInfo(date) {
  var d0 = new Date(START); d0.setHours(0,0,0,0);
  var d1 = new Date(date); d1.setHours(0,0,0,0);
  var diff = Math.floor((d1 - d0) / 86400000);
  if (diff < 0) return { status:'before', week:0 };
  if (diff >= 35) return { status:'after', week:6 };
  var week = Math.floor(diff/7)+1, dow = d1.getDay();
  var status = (dow<=3) ? 'task' : (dow===4) ? 'review' : (dow===5) ? 'rest' : 'exam';
  return { status:status, week:week, dow:dow, taskDay: (dow<=3 ? dow+1 : null) };
}
function wkStart(w) { var d = new Date(START); d.setDate(d.getDate()+(w-1)*7); return d; }
function taskDate(w, td) { var d = wkStart(w); d.setDate(d.getDate()+(td-1)); return d; }
function fmtD(d) { return DAR[d.getDay()] + ' ' + d.getDate() + ' ' + MAR[d.getMonth()]; }

/* ═══ SCORES ═══ */
function calcMaxPossible() {
  var now = new Date(); now.setHours(0,0,0,0); var max = 0;
  for (var w=1; w<=WEEKS; w++) {
    for (var d=1; d<=4; d++) { var td = taskDate(w,d); if (td <= now) max += 5; }
    var ed = wkStart(w); ed.setDate(ed.getDate()+6); if (ed <= now) max += 10;
  }
  return max;
}
function calcWeekMax(w) {
  var now = new Date(); now.setHours(0,0,0,0); var max = 0;
  for (var d=1; d<=4; d++) { var td = taskDate(w,d); if (td <= now) max += 5; }
  var ed = wkStart(w); ed.setDate(ed.getDate()+6); if (ed <= now) max += 10;
  return max;
}
function calcScores(uid_) {
  var now = new Date(); now.setHours(0,0,0,0);
  var result = [];
  for (var w=1; w<=WEEKS; w++) {
    var tS=0, tM=0;
    for (var d=1; d<=4; d++) {
      var td = taskDate(w,d); if (td > now) continue; tM += 5;
      var e = _data.entries[uid_+'_w'+w+'_d'+d];
      if (e && e.submitted) { for (var i=0; i<e.tasks.length; i++) { if (e.tasks[i].c) tS++; } }
    }
    var ex = _data.exams[uid_+'_w'+w];
    result.push({ w:w, tS:tS, tM:tM, eS: ex!=null ? ex.score : null, total: tS + (ex!=null ? ex.score : 0) });
  }
  return result;
}
function totalScore(uid_) {
  var s = calcScores(uid_), t = 0;
  for (var i=0; i<s.length; i++) t += s[i].total;
  return t;
}
function allHafizat() {
  var hfs = Object.values(_data.users).filter(function(u){ return u.role === 'hafiza'; });
  var result = hfs.map(function(u){ return Object.assign({}, u, { scores: calcScores(u.id), total: totalScore(u.id) }); });
  result.sort(function(a,b){ return b.total - a.total; });
  return result;
}

/* ═══ VIEW SWITCHING ═══ */

/* ═══ TASKS ═══ */
function renderTasks() {
  var el = document.getElementById('tabTasks');
  var eff = getEffectiveDate(), info = dayInfo(eff);

  if (info.status === 'before') {
    el.innerHTML = '<div class="banner b-before"><span class="bi">🌴</span><div>الحلقة تبدأ الأحد ٢٨ يونيو ٢٠٢٦ إن شاء الله — استعدي! 🌺</div></div>' + renderTasksPreview() + renderHistory();
    return;
  }
  if (info.status !== 'task') {
    var msgs = {
      review: '<div class="banner b-review"><span class="bi">📖</span><div><strong>يوم الخميس — يوم المراجعة 🌙</strong></div></div>',
      rest: '<div class="banner b-rest"><span class="bi">☀️</span><div><strong>يوم الجمعة — يوم الراحة! 🌸</strong></div></div>',

  var dm = ['الأحد','الإثنين','الثلاثاء','الأربعاء'];

  var ek = me.id+'_w'+info.week+'_d'+info.taskDay;

  var submitted = entry && entry.submitted;
  if (entry && !submitted) {
    for (var i=0; i<entry.tasks.length; i++) tStates[i] = entry.tasks[i].c;
  } else {
    tStates = [false,false,false,false,false];
  }
  var html = graceBanner;

  html += '<details style="margin-bottom:14px;"><summary style="cursor:pointer;padding:13px 18px;background:rgba(255,255,255,.82);border-radius:18px;border:1.5px solid rgba(13,148,136,.18);font-size:15px;font-weight:800;color:var(--t);list-style:none;display:flex;align-items:center;gap:8px;"><span>🌟</span> طريقة إنجاز بنود البطاقة <span style="margin-right:auto;opacity:.55;">﹀</span></summary><div style="background:rgba(255,255,255,.78);border-radius:0 0 18px 18px;border:1.5px solid rgba(13,148,136,.12);border-top:none;padding:14px 18px;">';
  for (var t=0; t<TASKS.length; t++) {
    html += '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(13,148,136,.08);"><span style="font-size:22px;flex-shrink:0;">' + TASKS[t].icon + '</span><div><div style="font-size:14px;font-weight:700;color:var(--tx);">' + TASKS[t].name + '</div><div style="font-size:12.5px;color:var(--mu);margin-top:2px;">' + TASKS[t].desc + '</div></div></div>';
  }
  html += '</div></details>';
  html += '<div class="card"><div class="ctitle">🌟 بطاقة إنجاز اليوم</div>';
  if (submitted) {
    html += '<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;background:var(--t);color:#fff;margin-bottom:12px;">✅ تم التسليم</span>';
    for (var i=0; i<TASKS.length; i++) {
      var done2 = entry.tasks[i].c, note2 = entry.tasks[i].n;
      html += '<div class="titem ' + (done2?'done':'') + '"><div class="thdr" style="cursor:default;"><div class="tico">' + TASKS[i].icon + '</div><div class="tnw"><div class="tn">' + TASKS[i].name + '</div><div class="tds">' + TASKS[i].desc + '</div>' + (note2 ? '<div style="font-size:12px;color:var(--c);margin-top:5px;padding:5px 9px;background:rgba(249,115,22,.08);border-radius:8px;">📝 ' + note2 + '</div>' : '') + '</div><div class="tchk" style="pointer-events:none;">' + (done2?'✓':'') + '</div></div></div>';
    }
    var cnt = 0; for (var i=0; i<entry.tasks.length; i++) { if (entry.tasks[i].c) cnt++; }
    html += '<div style="text-align:center;padding:14px;background:linear-gradient(135deg,var(--tp),rgba(224,242,254,.8));border-radius:14px;margin-top:12px;"><div style="font-size:28px;font-weight:900;color:var(--t);">' + an(cnt) + '/٥ 🌟</div><div style="font-size:13px;color:var(--mu);">إنجاز اليوم</div></div>';
    html += '<button class="btn bc" style="width:100%;margin-top:12px;" onclick="doExport(\'' + ek + '\')">📸 تصدير بطاقة الإنجاز</button>';
  } else {
    for (var i=0; i<TASKS.length; i++) {
      var ck = tStates[i];
      var notes = (entry && entry.tasks[i]) ? (entry.tasks[i].n || '') : '';
      html += '<div class="titem ' + (ck?'done':'') + '" id="ti' + i + '"><div class="thdr" onclick="togTask(' + i + ',\'' + ek + '\')"><div class="tico">' + TASKS[i].icon + '</div><div class="tnw"><div class="tn">' + TASKS[i].name + '</div><div class="tds">' + TASKS[i].desc + '</div></div><div class="tchk" id="tc' + i + '">' + (ck?'✓':'') + '</div></div><textarea class="tno" id="tn' + i + '" placeholder="ملاحظاتك..." oninput="autosave(\'' + ek + '\')">' + esc(notes) + '</textarea></div>';

  }
  html += '</div>' + renderHistory();
  el.innerHTML = html;
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function renderTasksPreview() {
  var html = '<div class="card"><div style="padding:10px 14px;background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(251,191,36,.08));border-radius:14px;border:1.5px solid rgba(245,158,11,.25);margin-bottom:14px;font-size:13.5px;font-weight:700;color:#78350f;">👁️ معاينة المهام</div><div class="ctitle">🌟 بطاقة إنجاز اليوم (معاينة)</div>';
  for (var i=0; i<TASKS.length; i++) {
    html += '<div class="titem" style="opacity:.85;"><div class="thdr" style="cursor:default;"><div class="tico">' + TASKS[i].icon + '</div><div class="tnw"><div class="tn">' + TASKS[i].name + '</div><div class="tds">' + TASKS[i].desc + '</div></div><div class="tchk"></div></div><textarea class="tno" disabled style="opacity:.5;cursor:not-allowed;"></textarea></div>';
  }
  return html + '<button class="btn bt bf" style="margin-top:14px;opacity:.45;cursor:not-allowed;" disabled>✅ التسليم يبدأ من الأحد</button></div>';
}

var _asTimer = null;

  var tasks = [];
  for (var i=0; i<TASKS.length; i++) {
    var n = document.getElementById('tn'+i);
    tasks.push({ id:TASKS[i].id, name:TASKS[i].name, icon:TASKS[i].icon, c:tStates[i], n: n ? n.value : '' });
  }
  var entry = { hafizaId: me.id, tasks: tasks, submitted: false, at: ts() };
  _data.entries[ek] = entry;
  clearTimeout(_asTimer);
  _asTimer = setTimeout(function(){ fbWrite('entries', ek, entry); }, 2000);
}

function togTask(i, ek) {
  tStates[i] = !tStates[i];
  document.getElementById('ti'+i).classList.toggle('done', tStates[i]);
  document.getElementById('tc'+i).textContent = tStates[i] ? '✓' : '';
  autosave(ek);
}

function submitTasks(ek) {
  var tasks = [];
  for (var i=0; i<TASKS.length; i++) {
    var n = document.getElementById('tn'+i);
    tasks.push({ id:TASKS[i].id, name:TASKS[i].name, icon:TASKS[i].icon, c:tStates[i], n: n ? n.value.trim() : '' });
  }
  var entry = { hafizaId: me.id, tasks: tasks, submitted: true, at: ts() };
  clearTimeout(_asTimer);
  _data.entries[ek] = entry;
  fbWrite('entries', ek, entry);
  tStates = [false,false,false,false,false];
  toast('✅ تم تسليم مهام اليوم!');

  setTimeout(function(){
    openMod('<div style="text-align:center;"><div style="font-size:42px;margin-bottom:12px;">📸</div><div style="font-size:18px;font-weight:800;color:var(--tx);margin-bottom:8px;">تصدير بطاقة الإنجاز</div><div style="color:var(--mu);font-size:14px;margin-bottom:20px;">هل تريدين تصدير بطاقتك؟</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><button class="btn bt" onclick="doExport(\'' + ekCopy + '\');closeMod()">📸 تصدير</button><button class="btn bg" onclick="closeMod()">لاحقاً</button></div></div>');
  }, 700);

  var w = wEl ? parseInt(wEl.value)||1 : 1, d = dEl ? parseInt(dEl.value)||1 : 1;
  var hfs = Object.values(_data.users).filter(function(u){ return u.role==='hafiza'; });
  var absent = hfs.filter(function(h){ return !(_data.entries[h.id+'_w'+w+'_d'+d] && _data.entries[h.id+'_w'+w+'_d'+d].submitted); });
  var present = hfs.filter(function(h){ return _data.entries[h.id+'_w'+w+'_d'+d] && _data.entries[h.id+'_w'+w+'_d'+d].submitted; });
  var el = document.getElementById('zrPreview'); if (!el) return;
  el.innerHTML = '<div style="background:rgba(254,226,226,.7);border:1.5px solid rgba(252,165,165,.3);border-radius:14px;padding:13px;margin-bottom:10px;"><div style="font-size:13.5px;font-weight:700;color:#7f1d1d;margin-bottom:7px;">⭕ لم تسلّم — '+an(absent.length)+' حافظة</div>'+(absent.length?absent.map(function(h){ return '<div style="padding:4px 0;font-size:13px;color:#991b1b;">• '+h.name+'</div>'; }).join(''):'<div style="font-size:13px;color:#6b7280;">✅ الجميع سلّمن</div>')+'</div>'+(present.length?'<div style="background:rgba(204,251,241,.6);border:1.5px solid rgba(20,184,166,.2);border-radius:14px;padding:11px;margin-bottom:10px;"><div style="font-size:13px;font-weight:700;color:var(--t);margin-bottom:5px;">✅ سلّمت — '+an(present.length)+'</div>'+present.map(function(h){ return '<div style="font-size:12px;color:var(--mu);">• '+h.name+'</div>'; }).join('')+'</div>':'')+'<div style="font-size:12px;color:var(--mu);text-align:center;padding:8px 12px;background:rgba(204,251,241,.4);border-radius:10px;">✅ الصفر يُعطى تلقائياً للغائبات في الأيام الماضية</div>';
}
function autoZeroAbsents() {
  var hfs = Object.values(_data.users).filter(function(u){ return u.role==='hafiza'; });
  if (!hfs.length) return Promise.resolve();
  var eff = getEffectiveDate();
  var effDay = new Date(eff); effDay.setHours(0,0,0,0);
  var writes = [];
  for (var w=1; w<=WEEKS; w++) {
    for (var d=1; d<=4; d++) {
      var td = taskDate(w,d); td.setHours(0,0,0,0);
      if (td >= effDay) continue;
      for (var hi=0; hi<hfs.length; hi++) {
        var h = hfs[hi], ek = h.id+'_w'+w+'_d'+d;
        if (!(_data.entries[ek] && _data.entries[ek].submitted)) {
          var tasks = TASKS.map(function(t){ return {id:t.id,name:t.name,icon:t.icon,c:false,n:''}; });
          var val2 = { hafizaId:h.id, tasks:tasks, submitted:true, at:ts(), isZero:true };
          _data.entries[ek] = val2;
          writes.push(db.collection('entries').doc(ek).set(val2));
        }
      }
    }
  }
  if (!writes.length) return Promise.resolve();
  return Promise.all(writes);
}
function drawAdUsers() {
  var hfs = Object.values(_data.users).filter(function(u){ return u.role==='hafiza'; });
  var el = document.getElementById('adUs'); if (!el) return;
  if (!hfs.length) { el.innerHTML = '<div style="text-align:center;padding:18px;color:var(--mu);">لا توجد حافظات 🌴</div>'; return; }
  el.innerHTML = '<div style="font-size:12px;color:#92400e;padding:9px 12px;background:rgba(254,243,199,.8);border-radius:10px;margin-bottom:12px;border:1.5px solid rgba(251,191,36,.3);">⚠️ حذف الحساب يحذف جميع درجاتها ومهامها نهائياً</div>' + hfs.map(function(h){ return '<div class="irow"><div><div style="font-weight:700;">'+h.name+'</div><div class="ilbl">@'+h.username+' | المجموع: '+an(totalScore(h.id))+'</div></div><button class="btn bsm" style="background:rgba(239,68,68,.1);color:#dc2626;border:1.5px solid rgba(239,68,68,.22);" onclick="confirmDeleteUser(\''+h.id+'\',\''+h.name.replace(/'/g,"\\'")+'\')">🗑️ حذف</button></div>'; }).join('');
}
function confirmDeleteUser(uid_, name) {
  openMod('<div style="text-align:center;"><div style="font-size:40px;margin-bottom:12px;">⚠️</div><div style="font-size:17px;font-weight:800;color:var(--tx);margin-bottom:8px;">حذف '+name+'؟</div><div style="color:var(--mu);font-size:13.5px;margin-bottom:20px;">سيتم حذف كل درجاتها ومهامها نهائياً</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><button class="btn" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;min-height:46px;" onclick="doDeleteUser(\''+uid_+'\')">🗑️ نعم</button><button class="btn bg" onclick="closeMod()">إلغاء</button></div></div>');
}
function doDeleteUser(uid_) {
  if (!_data.users[uid_]) { toast('❌ المستخدم غير موجود'); closeMod(); return; }
  var name = _data.users[uid_].name;
  var writes = [db.collection('users').doc(uid_).delete()];
  Object.keys(_data.entries).forEach(function(k){ if (k.indexOf(uid_+'_')===0) { delete _data.entries[k]; writes.push(db.collection('entries').doc(k).delete()); } });
  Object.keys(_data.exams).forEach(function(k){ if (k.indexOf(uid_+'_')===0) { delete _data.exams[k]; writes.push(db.collection('exams').doc(k).delete()); } });
  delete _data.users[uid_];
  Promise.all(writes).then(function(){ closeMod(); toast('✅ تم حذف '+name); }).catch(function(){ toast('❌ خطأ في الحذف'); });
  drawAdUsers();
}

/* ═══ EXPORT ═══ */
function doExport(ek) {
  var entry = _data.entries[ek];
  if (!entry || !entry.submitted) { toast('❌ لا توجد مهام مسلّمة'); return; }
  var m = ek.match(/_w(\d+)_d(\d+)$/);
  var w = m ? +m[1] : 1, d = m ? +m[2] : 1;
  var td = taskDate(w,d);
  var done = 0; for (var i=0; i<entry.tasks.length; i++) { if (entry.tasks[i].c) done++; }
  var card = document.getElementById('xcard');
  var thtml = '';
  for (var i=0; i<entry.tasks.length; i++) {
    var t = entry.tasks[i], def = null;
    for (var j=0; j<TASKS.length; j++) { if (TASKS[j].id === t.id) { def = TASKS[j]; break; } }
    thtml += '<div class="xtk"><span class="xti">'+t.icon+'</span><div class="xti2"><div class="xtn">'+t.name+'</div>'+(def?'<div class="xtno">'+def.desc+'</div>':'')+'</div><span class="xck">'+(t.c?'✅':'❌')+'</span></div>';
  }
  card.innerHTML = '<div class="xhd"><div class="xt">يُنعشـني إنجـازي 🍹🧡</div><div class="xnm">اسم المُنجـزة ☀️: '+me.name+'</div><div class="xme">الأسبوع '+an(w)+' | '+fmtD(td)+'</div></div><div class="xts">'+thtml+'</div><div class="xff">🌟 الإنجاز: '+an(done)+'/٥ مهام 🌟<div class="xfs">يُنعشني إنجازي | حلقة القرآن الكريم ١٤٤٧</div></div>';
  toast('⏳ جاري تحضير البطاقة...');
  html2canvas(card, {scale:2.8,backgroundColor:null,useCORS:true,logging:false}).then(function(canvas){
    var a = document.createElement('a');
    a.download = 'إنجاز_' + me.name.replace(/\s/g,'_') + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    toast('✅ تم تصدير البطاقة!');
  }).catch(function(){ toast('❌ خطأ في التصدير'); });
}

/* ═══ UI HELPERS ═══ */
function buildBadges(elId, fn, active) {
  if (active === undefined) active = 0;
  var el = document.getElementById(elId); if (!el) return;
  var html = '<button class="wbdg ' + (active===0?'active':'') + '" onclick="(' + fn.toString() + ')(0)">الإجمالي</button>';
  for (var i=1; i<=WEEKS; i++) {
    html += '<button class="wbdg ' + (active===i?'active':'') + '" onclick="(' + fn.toString() + ')(' + i + ')">أسبوع ' + an(i) + '</button>';
  }
  el.innerHTML = html;
}
function setBadgeActive(elId, active) {
  document.querySelectorAll('#' + elId + ' .wbdg').forEach(function(b,i){ b.classList.toggle('active', i===active); });
}
function swTab(t) {
  document.querySelectorAll('.tabbtn').forEach(function(b,i){ b.classList.toggle('active', (t==='l'&&i===0)||(t==='r'&&i===1)); });
  document.getElementById('fL').classList.toggle('hidden', t!=='l');
  document.getElementById('fR').classList.toggle('hidden', t!=='r');
}
function togSup() {
  var role = document.getElementById('rR');
  document.getElementById('scG').classList.toggle('hidden', !role || role.value !== 'supervisor');
}
function openMod(html) {
  document.getElementById('mbody').innerHTML = html;
  document.getElementById('mov').classList.remove('hidden');
}
function closeMod() { document.getElementById('mov').classList.add('hidden'); }
var _toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.classList.add('hidden'); }, 3200);
}
function showErr(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.classList.remove('hidden');
  setTimeout(function(){ el.classList.add('hidden'); }, 4500);
}
function val(id) { var el = document.getElementById(id); return el ? el.value : ''; }
function an(n) {
  if (n === null || n === undefined) return '—';
  return String(n).replace(/\d/g, function(d){ return '٠١٢٣٤٥٦٧٨٩'[d]; });
}

/* ═══ BOOT ═══ */
initApp();
document.addEventListener('keydown', function(e){
  if (e.key === 'Enter' && document.getElementById('vLogin').classList.contains('active')) doLogin();
});
</script>
